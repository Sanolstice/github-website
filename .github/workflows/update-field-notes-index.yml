name: Update field notes index

on:
  push:
    paths:
      - "data/field-notes/*.json"
      - "scripts/update-field-notes-index.py"
      - ".github/workflows/update-field-notes-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Rebuild field notes index
        run: python3 scripts/update-field-notes-index.py

      - name: Commit updated index
        run: |
          if [ -z "$(git status --short -- data/field-notes/index.json)" ]; then
            echo "Field notes index is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/field-notes/index.json
          git commit -m "Update field notes index"
          git push
